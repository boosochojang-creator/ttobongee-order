<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>동킹콩 - Donkey Kong (1981) 오마주</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body {
    background:#000;
    color:#fff;
    font-family:'Courier New', monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }
  h1 {
    color:#ff5252;
    margin:6px 0 2px;
    letter-spacing:3px;
    font-size:22px;
    text-shadow:2px 2px 0 #2962ff;
  }
  #info { color:#bbb; font-size:11px; margin-bottom:4px; text-align:center; }
  #wrap {
    position:relative;
    border:3px solid #444;
    background:#000;
    box-shadow:0 0 24px #2962ff55;
    max-width:100vw;
  }
  canvas { display:block; background:#000; image-rendering:pixelated; max-width:100vw; height:auto; }

  /* 오버레이 */
  #overlay {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:rgba(0,0,0,0.88); text-align:center; padding:16px;
  }
  #overlay h2 { color:#ffeb3b; font-size:30px; margin-bottom:14px; letter-spacing:3px; }
  #overlay p { margin:5px 0; font-size:13px; line-height:1.6; color:#ddd; }
  #overlay button {
    margin-top:18px; padding:12px 32px; background:#f44336; color:#fff; border:none;
    font-size:18px; font-family:inherit; cursor:pointer; letter-spacing:2px;
    box-shadow:3px 3px 0 #b71c1c; border-radius:4px;
  }
  #overlay button:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #b71c1c; }
  .hidden { display:none !important; }

  /* 모바일 컨트롤 */
  #touch {
    display:none;
    width:100%; max-width:640px;
    margin-top:10px;
    justify-content:space-between;
    align-items:flex-end;
    padding:0 14px 18px;
    gap:14px;
  }
  #touch.show { display:flex; }
  #dpad { position:relative; width:150px; height:150px; flex:0 0 auto; }
  .pad {
    position:absolute; width:50px; height:50px;
    background:#222; border:2px solid #555; color:#fff;
    font-size:22px; display:flex; align-items:center; justify-content:center;
    border-radius:8px;
  }
  .pad:active, .pad.active { background:#f44336; border-color:#ff8a80; }
  #pUp    { left:50px; top:0; }
  #pDown  { left:50px; top:100px; }
  #pLeft  { left:0; top:50px; }
  #pRight { left:100px; top:50px; }
  #btns { display:flex; flex-direction:column; gap:12px; align-items:flex-end; }
  .big {
    width:90px; height:90px; border-radius:50%;
    background:#2962ff; border:3px solid #82b1ff; color:#fff;
    font-size:18px; font-weight:bold; display:flex; align-items:center; justify-content:center;
  }
  .big:active, .big.active { background:#ff5252; border-color:#ff8a80; }
  #mute { width:66px; height:46px; border-radius:8px; background:#333; border:2px solid #666;
          color:#fff; font-size:13px; display:flex; align-items:center; justify-content:center; }
  #mute:active { background:#555; }
</style>
</head>
<body>
  <h1>동 킹 콩</h1>
  <div id="info">DONKEY KONG · 1981 NINTENDO (오마주 리메이크)</div>

  <div id="wrap">
    <canvas id="game" width="640" height="700"></canvas>
    <div id="overlay">
      <h2>DONKEY KONG</h2>
      <p><b>목표</b> : 배럴을 피해 사다리를 올라 꼭대기의 <span style="color:#ff80ab">폴린</span>을 구출!</p>
      <p>PC : ← → 이동 &nbsp;|&nbsp; ↑ ↓ 사다리 &nbsp;|&nbsp; Space/Z 점프 &nbsp;|&nbsp; M 음소거</p>
      <p>모바일 : 화면 하단 ▲▼◀▶ + JUMP 버튼</p>
      <p style="color:#ffeb3b">🔨 망치를 먹으면 잠시 무적! 배럴을 부숴 점수 획득</p>
      <button id="startBtn">START</button>
    </div>
  </div>

  <!-- 모바일 컨트롤 -->
  <div id="touch">
    <div id="dpad">
      <div class="pad" id="pUp">▲</div>
      <div class="pad" id="pLeft">◀</div>
      <div class="pad" id="pRight">▶</div>
      <div class="pad" id="pDown">▼</div>
    </div>
    <div id="btns">
      <div class="big" id="bJump">JUMP</div>
      <div id="mute">🔊</div>
    </div>
  </div>

<script>
/* ===== 동킹콩 (Donkey Kong) 오마주 =====
   - 경사진 철골(girder) 4단 + 사다리
   - DK가 꼭대기에서 배럴 투척, 배럴은 경사를 따라 굴러 내려옴
   - 점프로 배럴 회피(넘으면 점수), 망치로 배럴 파괴
   - 폴린 구출 시 스테이지 클리어, 보너스 타이머
   - WebAudio 8비트 사운드 + 인트로/플레이 BGM
   - PC 키보드 + 모바일 터치 겸용
*/
(() => {
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const W = cvs.width, H = cvs.height;
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

// ===== 사운드 (WebAudio) =====
let AC = null, muted = false;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function tone(freq, dur=0.08, type='square', vol=0.15, when=0){
  if(muted || !AC) return;
  const a = AC, t = a.currentTime + when;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  o.connect(g); g.connect(a.destination);
  o.start(t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.stop(t+dur);
}
function sfx(name){
  if(muted) return;
  ac();
  if(name==='jump'){ tone(330,0.07,'square',0.18); tone(660,0.10,'square',0.16,0.06); }
  if(name==='walk'){ tone(180,0.03,'square',0.06); }
  if(name==='score'){ tone(880,0.05,'square',0.16); tone(1320,0.08,'square',0.14,0.05); }
  if(name==='hammer'){ [392,523,659,784].forEach((f,i)=>tone(f,0.07,'square',0.18,i*0.06)); }
  if(name==='smash'){ tone(200,0.05,'sawtooth',0.2); tone(90,0.12,'sawtooth',0.2,0.04); }
  if(name==='die'){ [440,392,330,262,196].forEach((f,i)=>tone(f,0.18,'triangle',0.22,i*0.16)); }
  if(name==='clear'){ [523,659,784,1046,1318].forEach((f,i)=>tone(f,0.16,'square',0.2,i*0.13)); }
  if(name==='barrel'){ tone(140,0.06,'square',0.12); }
}

// ===== BGM: 동킹콩 풍 행진곡(근사 멜로디) =====
let bgmTimer=null, bgmIdx=0;
// "How high can you get" 분위기의 경쾌한 8비트 루프(오마주 근사치)
const bgmSeq = [
  [523,1],[523,1],[0,1],[523,1],[0,1],[415,1],[523,1],[0,1],[659,2],[0,2],
  [784,2],[0,2],[392,2],[0,2],
  [523,1],[0,1],[392,1],[0,1],[330,1],[440,1],[0,1],[494,1],[466,1],[440,1],
  [392,2],[523,1],[659,1],[784,1],[880,1],[698,1],[784,1],[0,2]
];
function startBGM(){
  if(bgmTimer) return;
  bgmIdx = 0;
  const step = 150;
  bgmTimer = setInterval(()=>{
    if(muted || !AC) return;
    const [f,len] = bgmSeq[bgmIdx % bgmSeq.length];
    if(f>0) tone(f, (step*len)/1000*0.9, 'square', 0.05);
    // 베이스
    if(bgmIdx % 4 === 0) tone(f>0?f/2:131, step/1000*0.8, 'triangle', 0.06);
    bgmIdx++;
  }, step);
}
function stopBGM(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } }

// ===== 레벨: 경사 철골 =====
// 각 층: 시작y, 끝y(경사), 좌→우 또는 우→좌 기울기
const GIRDER_H = 16;
const girders = [
  {x0:30,  y0:640, x1:610, y1:608},   // 맨 아래(약간 우상향)
  {x0:30,  y0:520, x1:610, y1:548},   // 우하향
  {x0:30,  y0:430, x1:610, y1:402},   // 우상향
  {x0:30,  y0:300, x1:610, y1:328},   // 우하향
  {x0:120, y0:200, x1:560, y1:200},   // 맨 위(평평) - DK & 폴린
];
function girderYAt(g, x){
  if(x < g.x0) x = g.x0;
  if(x > g.x1) x = g.x1;
  const t = (x - g.x0) / (g.x1 - g.x0 || 1);
  return g.y0 + (g.y1 - g.y0) * t;
}

// 사다리: 두 층을 연결
const ladders = [
  {x:520, a:0, b:1},
  {x:160, a:1, b:2},
  {x:430, a:1, b:2},
  {x:520, a:2, b:3},
  {x:120, a:2, b:3},
  {x:300, a:3, b:4},
];
const LADDER_W = 20;
function ladderTopY(L){ return girderYAt(girders[L.b], L.x) - GIRDER_H; }
function ladderBotY(L){ return girderYAt(girders[L.a], L.x); }

const GRAVITY = 0.55;

let state = {
  score:0, lives:3, bonus:5000, stage:1,
  barrels:[], hammer:null, hammerActive:0,
  gameover:false, cleared:false, flashTimer:0,
  throwTimer:0, won:false,
};

const player = {
  x:70, y:0, w:24, h:30, vx:0, vy:0,
  onGround:false, onLadder:false, facing:1,
  jumping:false, animT:0, floor:0,
};

const DK = { x:140, y:130, w:80, h:64, animT:0, beatT:0 };
const pauline = { x:300, y:150, w:22, h:34 };

// ===== 입력 =====
const keys = {};
function setKey(k,v){ keys[k]=v; }
window.addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(k==='m'){ muted=!muted; updateMuteBtn(); }
});
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

// 모바일 터치
const touchBar = document.getElementById('touch');
const muteBtn = document.getElementById('mute');
function updateMuteBtn(){ muteBtn.textContent = muted ? '🔇' : '🔊'; }
function bindPad(id, key){
  const el = document.getElementById(id);
  const on = e=>{ e.preventDefault(); setKey(key,true); el.classList.add('active'); };
  const off= e=>{ e.preventDefault(); setKey(key,false); el.classList.remove('active'); };
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
bindPad('pUp','arrowup'); bindPad('pDown','arrowdown');
bindPad('pLeft','arrowleft'); bindPad('pRight','arrowright');
bindPad('bJump',' ');
muteBtn.addEventListener('click', ()=>{ muted=!muted; updateMuteBtn(); });
// 터치기기 자동 표시
if('ontouchstart' in window || navigator.maxTouchPoints>0){ touchBar.classList.add('show'); }
window.addEventListener('touchstart', ()=> touchBar.classList.add('show'), {once:true});

// ===== 충돌 =====
function rectHit(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function ladderAt(px, w){
  const cx = px + w/2;
  for(const L of ladders){
    if(cx > L.x-2 && cx < L.x+LADDER_W+2) return L;
  }
  return null;
}

// ===== 스테이지 =====
function buildStage(){
  state.barrels = [];
  state.cleared = false;
  state.won = false;
  state.bonus = 5000;
  state.throwTimer = 90;
  // 망치 배치
  state.hammer = {x:480, y: girderYAt(girders[2], 480)-26, w:18, h:20, taken:false};
  state.hammerActive = 0;
  player.x = 70;
  player.floor = 0;
  player.y = girderYAt(girders[0], player.x) - player.h;
  player.vx=0; player.vy=0; player.onGround=true; player.onLadder=false;
}

function spawnBarrel(){
  state.barrels.push({
    x: DK.x+50, y: DK.y+50, w:20, h:20,
    vx: (2.0 + state.stage*0.25), vy:0,
    floor:4, onLadder:false, rot:0, scored:false
  });
  sfx('barrel');
}

// ===== 업데이트 =====
let timeAcc=0, bonusAcc=0;
function update(dt){
  if(state.gameover || state.won) return;
  if(state.cleared){ DK.animT+=dt; return; }

  // 보너스 감소
  bonusAcc += dt;
  if(bonusAcc >= 0.5){ bonusAcc=0; state.bonus = Math.max(0, state.bonus-100); }

  // DK 배럴 투척
  state.throwTimer -= dt*60;
  if(state.throwTimer <= 0){
    spawnBarrel();
    state.throwTimer = Math.max(70, 160 - state.stage*10) + Math.floor(state.bonus%50);
    DK.beatT = 0.4;
  }
  if(DK.beatT>0) DK.beatT -= dt;
  DK.animT += dt;

  // 망치 활성 타이머
  if(state.hammerActive>0){ state.hammerActive -= dt; }

  // ===== 플레이어 이동 =====
  const L = ladderAt(player.x, player.w);
  const onHammer = state.hammerActive>0;

  // 사다리 등반
  if(!onHammer && L){
    const topY = ladderTopY(L), botY = ladderBotY(L);
    const cy = player.y + player.h;
    if(keys['arrowup'] && cy > topY+4){
      player.onLadder = true; player.vy = -2.2; player.vx=0;
    } else if(keys['arrowdown'] && cy < botY-2){
      player.onLadder = true; player.vy = 2.2; player.vx=0;
    } else if(player.onLadder){
      player.vy = 0;
      // 사다리 끝 도달 처리
      if(cy <= topY+4 && keys['arrowup']){ }
    }
    // 사다리에서 좌우 누르면 내림
    if((keys['arrowleft']||keys['arrowright']) && player.onLadder){
      // 발판 위에 있을 때만 이탈
      player.onLadder=false;
    }
  } else {
    player.onLadder=false;
  }

  if(!player.onLadder){
    // 좌우 이동
    let mv=0;
    if(keys['arrowleft'])  { mv=-1; player.facing=-1; }
    if(keys['arrowright']) { mv= 1; player.facing= 1; }
    player.vx = mv * 2.6;
    if(mv!==0 && player.onGround){ player.animT+=dt*10; if(Math.random()<0.06) sfx('walk'); }

    // 점프
    if((keys[' ']||keys['z']) && player.onGround && !onHammer){
      player.vy = -8.4; player.onGround=false; player.jumping=true; sfx('jump');
    }
    player.vy += GRAVITY;
    if(player.vy>12) player.vy=12;
  }

  player.x += player.vx;
  player.y += player.vy;

  // 경계
  if(player.x < 28) player.x = 28;
  if(player.x > W-28-player.w) player.x = W-28-player.w;

  // 철골 착지 판정(사다리 중이 아닐 때)
  if(!player.onLadder){
    player.onGround=false;
    for(let i=0;i<girders.length;i++){
      const g = girders[i];
      const cx = player.x + player.w/2;
      if(cx < g.x0-6 || cx > g.x1+6) continue;
      const gy = girderYAt(g, cx);
      const feet = player.y + player.h;
      if(player.vy>=0 && feet >= gy-2 && feet <= gy + 16){
        player.y = gy - player.h;
        player.vy = 0;
        player.onGround = true;
        player.jumping = false;
        player.floor = i;
        break;
      }
    }
  } else {
    // 사다리 위 정렬
    player.x = L.x + (LADDER_W-player.w)/2;
    const topY = ladderTopY(L), botY = ladderBotY(L);
    const cy = player.y + player.h;
    if(cy <= topY){ player.y = topY - player.h; player.onLadder=false; player.onGround=true; player.floor=L.b; }
    if(cy >= botY){ player.y = botY - player.h; player.onLadder=false; player.onGround=true; player.floor=L.a; }
  }

  // ===== 망치 획득 =====
  if(state.hammer && !state.hammer.taken && rectHit(player, state.hammer)){
    state.hammer.taken = true;
    state.hammerActive = 6; // 6초
    sfx('hammer');
  }

  // ===== 배럴 업데이트 =====
  for(const b of state.barrels){
    b.rot += b.vx*0.1;
    // 현재 층 철골 위에서 굴러감
    const g = girders[b.floor];
    if(!g){ b.dead=true; continue; }
    const cx = b.x + b.w/2;
    const gy = girderYAt(g, cx);

    // 사다리로 내려갈지 확률적 결정
    if(!b.onLadder && b.floor>0){
      for(const Ld of ladders){
        if(Ld.b===b.floor && cx>Ld.x-4 && cx<Ld.x+LADDER_W+4){
          if(Math.random()<0.012){ b.onLadder=Ld; }
        }
      }
    }

    if(b.onLadder){
      b.y += 2.5;
      b.x = b.onLadder.x + (LADDER_W-b.w)/2;
      const botY = ladderBotY(b.onLadder);
      if(b.y+b.h >= botY){
        b.floor = b.onLadder.a;
        b.onLadder = null;
        // 방향: 새 층 경사 방향 따라
        const ng = girders[b.floor];
        b.vx = Math.abs(b.vx) * (ng.y1>ng.y0 ? 1 : -1);
      }
    } else {
      // 경사 따라 구르기: 낮은 쪽으로 가속
      b.x += b.vx;
      b.y = girderYAt(g, b.x+b.w/2) - b.h;
      // 벽 반사
      if(b.x < g.x0-4){ b.x=g.x0-4; b.vx=Math.abs(b.vx); }
      if(b.x+b.w > g.x1+4){ b.x=g.x1+4-b.w; b.vx=-Math.abs(b.vx); }
    }

    // 점프로 넘김 점수
    if(!b.scored && player.jumping && !player.onGround){
      if(Math.abs((player.x+player.w/2)-(b.x+b.w/2))<22 && player.y+player.h < b.y){
        b.scored=true; state.score+=100; sfx('score');
      }
    }

    // 망치로 파괴
    if(state.hammerActive>0 && rectHit(player,b)){
      b.dead=true; state.score+=300; sfx('smash'); continue;
    }
    // 충돌 사망
    if(state.hammerActive<=0 && rectHit(player,b)){ die(); return; }
  }
  state.barrels = state.barrels.filter(b=>!b.dead && b.y < H+40);

  // ===== 폴린 구출(클리어) =====
  if(player.floor===4 && Math.abs((player.x+player.w/2)-(pauline.x+pauline.w/2))<40 && player.onGround){
    if(!state.cleared){
      state.cleared = true;
      state.score += state.bonus;
      sfx('clear');
      setTimeout(()=>{ state.stage++; buildStage(); }, 2200);
    }
  }
}

function die(){
  sfx('die');
  state.lives--;
  state.flashTimer = 36;
  state.hammerActive = 0;
  if(state.lives<=0){
    state.gameover=true;
    stopBGM();
    setTimeout(showGameOver, 1400);
  } else {
    state.barrels = [];
    setTimeout(()=>{
      player.x=70; player.floor=0;
      player.y=girderYAt(girders[0],70)-player.h;
      player.vx=0; player.vy=0; player.onLadder=false; player.onGround=true;
      state.throwTimer=120;
    }, 900);
  }
}

function showGameOver(){
  overlay.classList.remove('hidden');
  overlay.innerHTML =
    '<h2 style="color:#ff5252">GAME OVER</h2>'+
    '<p>최종 점수 : <b>'+state.score+'</b></p>'+
    '<p>도달 스테이지 : '+state.stage+'</p>'+
    '<button id="restartBtn">RESTART</button>';
  document.getElementById('restartBtn').onclick=()=>location.reload();
}

// ===== 렌더 =====
function drawGirder(g){
  ctx.strokeStyle='#ff5252'; ctx.lineWidth=GIRDER_H;
  ctx.beginPath(); ctx.moveTo(g.x0,g.y0+GIRDER_H/2); ctx.lineTo(g.x1,g.y1+GIRDER_H/2); ctx.stroke();
  // 리벳/패턴
  ctx.strokeStyle='#3d5afe'; ctx.lineWidth=2;
  const steps=24;
  for(let i=0;i<=steps;i++){
    const x=g.x0+(g.x1-g.x0)*i/steps;
    const y=girderYAt(g,x);
    ctx.beginPath(); ctx.moveTo(x,y+1); ctx.lineTo(x,y+GIRDER_H-1); ctx.stroke();
  }
}
function drawLadder(L){
  const x=L.x, topY=ladderTopY(L), botY=ladderBotY(L);
  ctx.strokeStyle='#42a5f5'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x,topY); ctx.lineTo(x,botY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+LADDER_W,topY); ctx.lineTo(x+LADDER_W,botY); ctx.stroke();
  for(let y=topY+6;y<botY;y+=12){
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+LADDER_W,y); ctx.stroke();
  }
}
function drawDK(){
  const bounce = DK.beatT>0 ? -6 : 0;
  const x=DK.x, y=DK.y+bounce;
  // 몸통
  ctx.fillStyle='#6d4c41';
  ctx.fillRect(x+10,y+20,60,40);
  ctx.fillStyle='#a1887f';
  ctx.fillRect(x+22,y+30,36,24); // 가슴
  // 머리
  ctx.fillStyle='#6d4c41';
  ctx.fillRect(x+18,y,44,30);
  // 눈
  ctx.fillStyle='#fff'; ctx.fillRect(x+26,y+8,8,8); ctx.fillRect(x+44,y+8,8,8);
  ctx.fillStyle='#000'; ctx.fillRect(x+29,y+10,4,4); ctx.fillRect(x+47,y+10,4,4);
  // 코/입
  ctx.fillStyle='#3e2723'; ctx.fillRect(x+30,y+20,22,6);
  // 팔(투척 모션)
  ctx.fillStyle='#5d4037';
  const armY = DK.beatT>0 ? y+6 : y+24;
  ctx.fillRect(x-2,armY,16,14); ctx.fillRect(x+66,armY,16,14);
}
function drawPauline(){
  const x=pauline.x, y=pauline.y;
  // 드레스
  ctx.fillStyle='#ff80ab'; ctx.fillRect(x,y+14,22,20);
  // 몸/머리
  ctx.fillStyle='#ffe0b2'; ctx.fillRect(x+5,y+2,12,12);
  // 머리카락
  ctx.fillStyle='#5d4037'; ctx.fillRect(x+3,y,16,5);
  // HELP! 깜빡임
  if(Math.floor(DK.animT*2)%2===0){
    ctx.fillStyle='#ffeb3b'; ctx.font='bold 12px monospace';
    ctx.fillText('HELP!', x-6, y-6);
  }
}
function drawPlayer(){
  if(state.flashTimer>0 && Math.floor(state.flashTimer/3)%2===0){ return; }
  const x=player.x, y=player.y;
  const step = Math.floor(player.animT)%2;
  // 모자
  ctx.fillStyle='#e53935'; ctx.fillRect(x+4,y,16,6); ctx.fillRect(x+(player.facing>0?14:0),y+2,10,4);
  // 얼굴
  ctx.fillStyle='#ffcc80'; ctx.fillRect(x+5,y+6,14,8);
  // 콧수염
  ctx.fillStyle='#4e342e'; ctx.fillRect(x+5,y+12,14,3);
  // 셔츠
  ctx.fillStyle='#e53935'; ctx.fillRect(x+3,y+15,18,8);
  // 멜빵바지
  ctx.fillStyle='#1e88e5'; ctx.fillRect(x+3,y+22,18,8);
  // 다리
  ctx.fillStyle='#1e88e5';
  if(player.onGround && (player.vx!==0)){
    ctx.fillRect(x+3,y+28,7,3+step*0); ctx.fillRect(x+14,y+28,7,3);
    ctx.fillStyle='#5d4037'; ctx.fillRect(x+2+step*4,y+29,7,3);
  } else {
    ctx.fillRect(x+4,y+28,6,3); ctx.fillRect(x+14,y+28,6,3);
  }
  // 망치 표시
  if(state.hammerActive>0){
    ctx.fillStyle='#8d6e63'; ctx.fillRect(x+(player.facing>0?20:-8),y-14,4,18);
    ctx.fillStyle='#bdbdbd'; ctx.fillRect(x+(player.facing>0?14:-12),y-18,16,10);
  }
}
function drawBarrel(b){
  ctx.save();
  ctx.translate(b.x+b.w/2,b.y+b.h/2);
  ctx.rotate(b.rot);
  ctx.fillStyle='#a1521f'; ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
  ctx.fillStyle='#5d2e0c';
  ctx.fillRect(-b.w/2,-b.h/2+3,b.w,3);
  ctx.fillRect(-b.w/2,b.h/2-6,b.w,3);
  ctx.fillStyle='#c97b3c';
  ctx.fillRect(-2,-b.h/2,4,b.h);
  ctx.restore();
}
function drawHammer(h){
  ctx.fillStyle='#8d6e63'; ctx.fillRect(h.x+6,h.y+6,5,14);
  ctx.fillStyle='#cfd8dc'; ctx.fillRect(h.x,h.y,18,8);
}
function drawHUD(){
  ctx.textAlign='left';
  ctx.fillStyle='#fff'; ctx.font='bold 16px monospace';
  ctx.fillText('SCORE', 30, 28);
  ctx.fillStyle='#ffeb3b'; ctx.font='bold 20px monospace';
  ctx.fillText(String(state.score).padStart(6,'0'), 30, 50);

  ctx.fillStyle='#42a5f5'; ctx.font='bold 14px monospace';
  ctx.fillText('BONUS', 270, 28);
  ctx.fillStyle= state.bonus<1500?'#ff5252':'#fff';
  ctx.font='bold 18px monospace';
  ctx.fillText(String(state.bonus), 270, 48);

  ctx.fillStyle='#fff'; ctx.font='bold 14px monospace';
  ctx.fillText('STAGE '+state.stage, 420, 28);
  // 라이프(마리오 모자)
  for(let i=0;i<state.lives;i++){
    const lx=420+i*22, ly=38;
    ctx.fillStyle='#e53935'; ctx.fillRect(lx,ly,14,5); ctx.fillRect(lx+8,ly+2,8,3);
  }
  if(state.hammerActive>0){
    ctx.fillStyle='#ffeb3b'; ctx.font='bold 14px monospace';
    ctx.fillText('🔨 '+state.hammerActive.toFixed(1)+'s', 540, 28);
  }
  if(muted){ ctx.fillStyle='#ff5252'; ctx.font='12px monospace'; ctx.fillText('MUTED', 575, 50); }
}

function render(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  // 오일통(배럴 더미)
  ctx.fillStyle='#1565c0'; ctx.fillRect(40, girderYAt(girders[0],60)-44, 36, 44);
  ctx.fillStyle='#ff7043'; ctx.fillRect(46, girderYAt(girders[0],60)-44, 24, 8);

  girders.forEach(drawGirder);
  ladders.forEach(drawLadder);
  if(state.hammer && !state.hammer.taken) drawHammer(state.hammer);
  drawDK();
  drawPauline();
  state.barrels.forEach(drawBarrel);
  drawPlayer();
  drawHUD();

  if(state.flashTimer>0) state.flashTimer--;

  if(state.cleared){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,300,W,120);
    ctx.fillStyle='#ffeb3b'; ctx.font='bold 38px monospace'; ctx.textAlign='center';
    ctx.fillText('RESCUED!', W/2, 360);
    ctx.fillStyle='#fff'; ctx.font='18px monospace';
    ctx.fillText('+BONUS '+state.bonus, W/2, 395);
    ctx.textAlign='left';
  }
}

// ===== 루프 =====
let lastTime=0;
function loop(t){
  const dt = Math.min((t-lastTime)/1000, 0.05);
  lastTime=t;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', ()=>{
  overlay.classList.add('hidden');
  ac();
  if(AC.state==='suspended') AC.resume();
  updateMuteBtn();
  startBGM();
  buildStage();
  lastTime=performance.now();
  requestAnimationFrame(loop);
});

// 초기 화면
ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
girders.forEach(drawGirder); ladders.forEach(drawLadder);
drawDK(); drawPauline();
})();
</script>
</body>
</html>
